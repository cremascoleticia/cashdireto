name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  worker:
    name: Worker (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install --upgrade pip && pip install -e ".[dev]"
      - name: Test
        run: pytest -q

  migrations:
    name: Migrations sobem do zero + RLS cross-titular
    runs-on: ubuntu-latest
    services:
      postgres:
        image: supabase/postgres:15.1.0.117
        env:
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      PGURL: postgres://postgres:postgres@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v4
      - name: Install psql + driver
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          python -m pip install --upgrade pip && pip install "psycopg[binary]"
      - name: Bootstrap roles/extensões esperados pelo Supabase
        # A imagem supabase/postgres já traz auth.uid()/roles; garantimos idempotência.
        run: |
          psql "$PGURL" -v ON_ERROR_STOP=1 -c "create extension if not exists pgcrypto;"
      - name: Aplicar migrations do zero (ordem por nome de arquivo)
        run: |
          for f in $(ls supabase/migrations/*.sql | sort); do
            echo ">> $f"
            psql "$PGURL" -v ON_ERROR_STOP=1 -f "$f"
          done
      - name: Teste de RLS cross-titular
        env:
          DATABASE_URL: ${{ env.PGURL }}
        run: python scripts/run_rls_test.py
