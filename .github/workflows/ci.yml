name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  worker:
    name: Worker (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install --upgrade pip && pip install -e ".[dev]"
      - name: Test
        run: pytest -q

  migrations:
    name: Migrations sobem do zero + RLS cross-titular
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install psql + driver
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          python -m pip install --upgrade pip && pip install "psycopg[binary]"
      - name: Shim dos objetos do Supabase (roles, auth.*, storage.*) no Postgres puro
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f ci/supabase_shim.sql
      - name: Aplicar migrations do zero (ordem por nome de arquivo)
        run: |
          for f in $(ls supabase/migrations/*.sql | sort); do
            echo ">> $f"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"
          done
      - name: Teste de RLS cross-titular
        # psql lida com o script multi-statement; ON_ERROR_STOP=1 falha o job se a asserção disparar.
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f supabase/tests/rls_cross_titular.sql
