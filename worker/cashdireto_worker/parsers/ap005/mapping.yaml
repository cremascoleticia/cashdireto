# De-para AP005 → core.ap005_ur (1 linha = 1 UR) + core.ap005_pagamento (coluna 12).
# Fonte da verdade: docs/fontes/AP005.md (layout oficial CERC). O parser (parser.py) é a implementação.
fonte: AP005
formato: csv
encoding: utf-8            # tolera BOM (utf-8-sig)
separador: ";"
decimal: "."
cabecalho: false          # SEM cabeçalho; 16 colunas posicionais
multi_titular: true       # arquivo abrange vários usuários finais → fonte_arquivo.titular_id NULO

# data_referencia não vem em coluna: token _YYYYMMDD_ do nome (padrão CERC), com fallback.
data_referencia:
  origem: nome_arquivo
  regex: "(?<!\\d)(\\d{8})(?!\\d)"   # primeiro token de 8 dígitos que seja data válida
  formato: "%Y%m%d"
  fallback: data_da_analise

# Colunas posicionais 1..16 → core.ap005_ur
ur:
  1:  referencia_externa          # id de controle do solicitante
  2:  registradora_doc
  3:  credenciadora_doc
  4:  usuario_final_doc           # + resolve titular_id (join core.titular.cnpj, cru)
  5:  arranjo                     # código cru, sem decodificar
  6:  data_liquidacao             # AAAA-MM-DD
  7:  titular_ur_doc
  8:  constituicao                # 1=Constituída, 2=A constituir
  9:  valor_constituido_total
  10: valor_constituido_antecip
  11: valor_bloqueado
  12: -> core.ap005_pagamento     # lista quotada de sub-registros (ver abaixo)
  13: carteira
  14: valor_livre
  15: valor_total_ur
  16: atualizado_em               # RFC3339 → timestamptz

# Coluna 12: sub-registros separados por '|', cada um com 16 posições (12.16 pode faltar → 15).
pagamento:
  1:  titular_domicilio_doc
  2:  tipo_conta                  # CC/CD/CG/CI/PG/PP
  3:  compe
  4:  ispb
  5:  agencia
  6:  conta
  7:  valor_a_pagar
  8:  beneficiario_doc
  9:  data_liquidacao_efetiva
  10: valor_liquidacao_efetiva
  11: regra_divisao               # 1=valor definido, 2=percentual
  12: valor_onerado               # % ou R$ conforme 12.11
  13: tipo_informacao_pagamento   # 1..8 (1=troca titular, 2=ônus cessão, ..., 7=domicílio, 8=promessa)
  14: indicador_ordem_efeito
  15: valor_constituido_efeito
  16: identificador_cerc_contrato # só p/ efeito de contrato; pode estar ausente

validacoes:
  - exatamente 16 colunas por linha; senão erro (não adivinha)
  - usuario_final_doc (col4) não vazio
  - sub-registro com no máximo 16 posições; faltando posições finais → NULL
  - decimais com ponto; vazios → NULL (não 0)

idempotencia:
  - sha256 do arquivo em core.fonte_arquivo (tipo AP005, titular_id NULO).
  - reprocessar: delete core.ap005_ur do fonte_id (cascade → ap005_pagamento) e regrava.
  - pagamentos religados à UR por (fonte_id, linha).

observacoes:
  - "arranjo, tipo_informacao_pagamento, regra_divisao: guardados crus; decodificar é Fase 1b/2."
  - "valor_onerado pode ser % ou R$ conforme regra_divisao — não normalizar no parser."
